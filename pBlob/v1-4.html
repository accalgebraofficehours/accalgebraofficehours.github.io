<!DOCTYPE html>
<html>
<head>
  <title>Offline Site Packer</title>
</head>
<body>
  <h1>God-Tier Offline Site Packer</h1>
  <script>
    const proxied = (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;

    async function godClone(entry) {
      const FS = new Map();
      const queue = [entry];
      const visited = new Set();
      const abs = (base, p) => new URL(p, base).href;

      console.log(`%c[godClone] Starting clone of: ${entry}`, "color: cyan; font-weight: bold");

      async function grab(url) {
        if (visited.has(url)) {
          console.log(`%c[skip] Already visited: ${url}`, "color: gray");
          return;
        }
        visited.add(url);
        console.log(`%c[fetch] → ${url}`, "color: #8be9fd");
        console.log(`  Queue remaining: ${queue.length} | Visited: ${visited.size} | FS size: ${FS.size}`);

        try {
          const res = await fetch(proxied(url));
          console.log(`  [response] ${res.status} ${res.statusText} — Content-Type: ${res.headers.get("content-type")}`);

          const type = res.headers.get("content-type") || "";
          let data;

          if (type.includes("text") || type.includes("javascript") || type.includes("json")) {
            data = await res.text();
            console.log(`  [text] ${data.length} chars received`);
          } else {
            const blob = await res.blob();
            data = await blob.arrayBuffer();
            console.log(`  [binary] ${data.byteLength} bytes received`);
          }

          FS.set(url, { type, data });
          console.log(`  [stored] FS now has ${FS.size} entries`);

          if (type.includes("html")) {
            console.log(`  [parse] Parsing HTML for linked assets...`);
            const doc = new DOMParser().parseFromString(data, "text/html");
            let newUrls = 0;
            doc.querySelectorAll("[src],[href]").forEach(el => {
              const attr = el.hasAttribute("src") ? "src" : "href";
              const val = el.getAttribute(attr);
              if (!val) return;
              const resolved = abs(url, val);
              console.log(`    [html asset] ${el.tagName} ${attr}="${val}" → ${resolved}`);
              queue.push(resolved);
              newUrls++;
            });
            console.log(`  [html] Added ${newUrls} URLs to queue`);
          }

          if (type.includes("javascript")) {
            console.log(`  [parse] Scanning JS for dynamic imports and chunks...`);
            const imports = data.match(/import\(["'](.+?)["']\)/g) || [];
            console.log(`    [js] Found ${imports.length} dynamic import()`);
            imports.forEach(i => {
              const p = i.match(/["'](.+?)["']/)[1];
              const resolved = abs(url, p);
              console.log(`      → ${resolved}`);
              queue.push(resolved);
            });

            const chunks = data.match(/["'](.+?\.js)["']/g) || [];
            console.log(`    [js] Found ${chunks.length} potential .js chunk references`);
            chunks.forEach(c => {
              const p = c.slice(1, -1);
              if (p.endsWith(".js")) {
                const resolved = abs(url, p);
                console.log(`      → ${resolved}`);
                queue.push(resolved);
              }
            });
          }

          if (type.includes("css")) {
            console.log(`  [parse] Scanning CSS for url() assets...`);
            const urls = data.match(/url\((.*?)\)/g) || [];
            console.log(`    [css] Found ${urls.length} url() references`);
            urls.forEach(u => {
              const asset = u.slice(4, -1).replace(/['"]/g, "");
              const resolved = abs(url, asset);
              console.log(`      → ${resolved}`);
              queue.push(resolved);
            });
          }

        } catch (e) {
          console.warn(`%c[error] Failed to fetch: ${url}`, "color: #ff5555", e);
        }
      }

      while (queue.length) {
        console.log(`%c[queue] Processing next. Queue depth: ${queue.length}`, "color: #bd93f9");
        await grab(queue.shift());
      }

      console.log(`%c[done] Crawl complete!`, "color: #50fa7b; font-weight: bold");
      console.log(`  Total resources fetched: ${FS.size}`);
      console.log(`  URLs visited: ${visited.size}`);
      console.table([...FS.entries()].map(([url, v]) => ({
        url,
        type: v.type,
        size: v.data instanceof ArrayBuffer ? `${v.data.byteLength}b` : `${v.data.length} chars`
      })));

      console.log(`[pack] Serializing FS to JSON...`);
      const serialized = [...FS].map(([k, v]) => [
        k,
        {
          type: v.type,
          data: v.data instanceof ArrayBuffer ? Array.from(new Uint8Array(v.data)) : v.data
        }
      ]);
      console.log(`[pack] Serialized ${serialized.length} entries`);

      const runtime = `
        const FS=new Map();
        const raw=${JSON.stringify(serialized)};
        console.log("[runtime] Hydrating FS with", raw.length, "entries...");
        for(const [url,obj] of raw){
          if(Array.isArray(obj.data)){
            const buf=new Uint8Array(obj.data).buffer;
            FS.set(url,new Blob([buf],{type:obj.type}));
          }else{
            FS.set(url,new Blob([obj.data],{type:obj.type}));
          }
        }
        console.log("[runtime] FS hydrated:", FS.size, "entries");
        const realFetch=window.fetch;
        window.fetch=async function(url,opts){
          const abs=new URL(url,location.href).href;
          if(FS.has(abs)){
            console.log("[fetch intercept] Serving from FS:", abs);
            return new Response(FS.get(abs));
          }
          console.warn("[fetch intercept] Not in FS, passing through:", abs);
          return realFetch(url,opts);
        };
        const XHR=XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open=function(method,url){
          this._url=new URL(url,location.href).href;
          console.log("[XHR intercept] open:", method, this._url);
          return XHR.apply(this,arguments);
        };
        const send=XMLHttpRequest.prototype.send;
        XMLHttpRequest.prototype.send=function(){
          if(FS.has(this._url)){
            console.log("[XHR intercept] Serving from FS:", this._url);
            const reader=new FileReader();
            reader.onload=()=>{
              this.readyState=4;
              this.status=200;
              this.responseText=reader.result;
              this.onload&&this.onload();
            };
            reader.readAsText(FS.get(this._url));
            return;
          }
          console.warn("[XHR intercept] Not in FS, passing through:", this._url);
          return send.apply(this,arguments);
        };
        console.log("%c[God runtime ready]", "color: lime; font-weight: bold", FS);
      `;

      console.log(`[pack] Building output blob...`);
      const mainEntry = FS.get(entry);
      if (!mainEntry) {
        console.error(`[pack] FAILED — entry URL was never successfully fetched: ${entry}`);
        console.error(`  This usually means the very first fetch failed (CORS, network, typo in URL).`);
        console.error(`  FS contents:`, [...FS.keys()]);
        return;
      }
      const main = mainEntry.data;
      const blob = new Blob(["<script>" + runtime + "<\/script>" + main], { type: "text/html" });
      const blobUrl = URL.createObjectURL(blob);
      console.log(`%c[open] Opening packed page: ${blobUrl}`, "color: #50fa7b; font-weight: bold");
      window.open(blobUrl);
    }

    godClone("https://example.com");
  </script>
</body>
</html>
